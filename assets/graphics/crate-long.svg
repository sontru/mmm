<svg xmlns="http://www.w3.org/2000/svg" width="128" height="64" viewBox="0 0 128 64" role="img" aria-label="Two tile wide 3D wooden crate side view">
  <defs>
    <linearGradient id="front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a5535"/>
      <stop offset="1" stop-color="#4d3324"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a7048"/>
      <stop offset="1" stop-color="#6b482f"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a4931"/>
      <stop offset="1" stop-color="#39261d"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="66" cy="58" rx="52" ry="5" fill="#000" opacity="0.25"/>

  <!-- top plane -->
  <polygon points="12,10 106,10 118,20 24,20" fill="url(#top)" stroke="#241918" stroke-width="2"/>

  <!-- right depth plane -->
  <polygon points="106,10 118,20 118,52 106,44" fill="url(#side)" stroke="#241918" stroke-width="2"/>

  <!-- front face: 2 tiles wide x 1 tile tall -->
  <rect x="12" y="20" width="94" height="32" fill="url(#front)" stroke="#241918" stroke-width="2"/>

  <!-- plank divisions -->
  <line x1="59" y1="20" x2="59" y2="52" stroke="#2a1b17" stroke-width="2" opacity="0.7"/>
  <line x1="24" y1="20" x2="12" y2="10" stroke="#2a1b17" stroke-width="1.5" opacity="0.5"/>
  <line x1="71" y1="20" x2="59" y2="10" stroke="#2a1b17" stroke-width="1.5" opacity="0.5"/>
  <line x1="106" y1="20" x2="94" y2="10" stroke="#2a1b17" stroke-width="1.5" opacity="0.5"/>

  <!-- left tile cross brace -->
  <line x1="19" y1="25" x2="52" y2="47" stroke="#a9804f" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="25" x2="19" y2="47" stroke="#a9804f" stroke-width="3" stroke-linecap="round"/>

  <!-- right tile cross brace -->
  <line x1="66" y1="25" x2="99" y2="47" stroke="#a9804f" stroke-width="3" stroke-linecap="round"/>
  <line x1="99" y1="25" x2="66" y2="47" stroke="#a9804f" stroke-width="3" stroke-linecap="round"/>

  <!-- border rails -->
  <rect x="12" y="20" width="94" height="6" fill="#6b482f" opacity="0.65"/>
  <rect x="12" y="46" width="94" height="6" fill="#3d281f" opacity="0.55"/>

  <!-- highlights -->
  <line x1="15" y1="12" x2="103" y2="12" stroke="#bd9360" stroke-width="1.5" opacity="0.45"/>
  <line x1="116" y1="22" x2="116" y2="49" stroke="#9a7048" stroke-width="1.2" opacity="0.35"/>
</svg>
